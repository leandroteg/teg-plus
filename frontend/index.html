<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#060D1B" />
    <meta name="description" content="TEG+ ERP — Sistema interno de gestão movido por IA para obras de engenharia elétrica e transmissão" />
    <meta name="application-name" content="TEG+ ERP" />
    <meta name="apple-mobile-web-app-title" content="TEG+ ERP" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <title>TEG+ ERP · Interno movido por IA</title>
  </head>
  <body class="bg-gray-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (async function forceClientCacheCleanup() {
        if (!('serviceWorker' in navigator)) return
        const CLEANUP_FLAG = 'teg_sw_cleanup_v2'
        if (sessionStorage.getItem(CLEANUP_FLAG) === '1') return

        try {
          let hadClientCache = false
          const registrations = await navigator.serviceWorker.getRegistrations()
          if (registrations.length > 0) {
            hadClientCache = true
            await Promise.all(registrations.map((registration) => registration.unregister()))
          }

          if ('caches' in window) {
            const cacheKeys = await caches.keys()
            if (cacheKeys.length > 0) hadClientCache = true
            await Promise.all(cacheKeys.map((key) => caches.delete(key)))
          }

          sessionStorage.setItem(CLEANUP_FLAG, '1')
          if (hadClientCache) window.location.reload()
        } catch (_) {
          sessionStorage.setItem(CLEANUP_FLAG, '1')
        }
      })()
    </script>
  </body>
</html>
